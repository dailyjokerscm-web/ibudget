{% extends "base.html" %}

{% block title %}Sign Up - iBudget{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: auto;">
    <h2 style="color: #667eea; text-align: center; margin-bottom: 2rem;">Create Account</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required>
            <small style="color: #999;">3-20 characters, letters, numbers, hyphens, underscores</small>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
        </div>
        
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
        </div>
        
        <button type="submit" style="width: 100%;">Create Account</button>
        
        <p style="text-align: center; margin-top: 1rem; color: #666;">
            Already have an account? <a href="/login" style="color: #667eea; text-decoration: none;">Login here</a>
        </p>
    </form>
</div>
{% endblock %}
