{% extends "weather_base.html" %}

{% block title %}Login - Weather Dashboard{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto;">
    <h2 style="color: #667eea; text-align: center; margin-bottom: 2rem;">Login</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" style="width: 100%;">Login</button>
        
        <p style="text-align: center; margin-top: 1rem; color: #666;">
            Don't have an account? <a href="/signup" style="color: #667eea; text-decoration: none; font-weight: bold;">Sign up here</a>
        </p>
    </form>
</div>
{% endblock %}
